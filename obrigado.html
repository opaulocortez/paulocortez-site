<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposta Enviada | Paulo Cortez - ProCrescer Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #FFFFFF;
      --bg-darker: #F4F8FB;
      --bg-card: #FFFFFF;
      --text-white: #1A2B33;
      --text-gray: #5A6B73;
      --text-dim: #95A3AB;
      --accent: #00B8E6;
      --accent-bright: #00A0CC;
      --border: #E2E9ED;
      --whatsapp: #25D366;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-darker);
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 620px;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 48px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.07);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(0,184,230,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 36px; height: 36px; fill: var(--accent); }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 28px;
      margin-bottom: 14px;
      color: var(--text-white);
    }
    h1 span { color: var(--accent); }
    p {
      font-size: 16px;
      color: var(--text-gray);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 26px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-bright); transform: translateY(-2px); }
    .btn-whatsapp { background: var(--whatsapp); color: #fff; }
    .btn-whatsapp:hover { background: #20BD5A; transform: translateY(-2px); }
    .footer-note {
      margin-top: 32px;
      font-size: 13px;
      color: var(--text-dim);
    }
    @media (max-width: 600px) {
      .card { padding: 36px 24px; }
      .btn-group { flex-direction: column; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
      </svg>
    </div>
    <h1>Proposta <span>enviada!</span></h1>
    <p>Recebi sua solicitação e vou analisar com atenção. Em breve entro em contato pelo e-mail ou WhatsApp que você informou.</p>
    <div class="btn-group">
      <a href="index.html" class="btn btn-primary">Voltar ao site</a>
      <a href="https://wa.me/5511920182998?text=Ol%C3%A1%2C%20Paulo!%20Acabei%20de%20enviar%20uma%20proposta%20pelo%20site." class="btn btn-whatsapp">Falar no WhatsApp</a>
    </div>
    <p class="footer-note">Paulo Cortez | ProCrescer Academy &mdash; Porque, no fim das contas, &eacute; sempre sobre pessoas.</p>
  </main>
</body>
</html>
